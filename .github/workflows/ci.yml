name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install toq
        run: curl -sSf https://toq.dev/install.sh | sh && echo "$HOME/.toq/bin" >> $GITHUB_PATH
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm test
        env:
          TOQ_BIN: toq
